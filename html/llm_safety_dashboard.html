<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Safety Automation Toolkit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.15);
            --danger: #ff3366;
            --danger-glow: rgba(255, 51, 102, 0.15);
            --warning: #ffaa00;
            --warning-glow: rgba(255, 170, 0, 0.15);
            --bg-dark: #0a0e14;
            --bg-darker: #050811;
            --bg-card: #12161f;
            --bg-card-hover: #1a1f2e;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border: #21262d;
            --border-bright: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--bg-darker);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
            animation: gridPulse 20s ease-in-out infinite;
        }

        @keyframes gridPulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.15;
            }
        }

        /* Glowing orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--danger);
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Header */
        .header {
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #00cc66);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 64px;
        }

        /* Card grid */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .test-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-glow), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .test-card:hover {
            border-color: var(--border-bright);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .test-card:hover::before {
            opacity: 1;
        }

        .test-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .test-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .test-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            background: var(--bg-darker);
            border: 1px solid var(--border);
        }

        .test-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .test-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .test-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        /* Configuration panel */
        .config-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
        }

        .config-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .config-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .label-badge {
            font-size: 0.7rem;
            padding: 0.125rem 0.5rem;
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        input,
        select {
            padding: 0.75rem 1rem;
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 10px;
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-darker);
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .btn-primary:hover {
            background: #00ff99;
            box-shadow: 0 6px 24px var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-darker);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--border-bright);
            background: var(--bg-card);
        }

        /* Results section */
        .results-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            animation: fadeInUp 0.6s ease-out 0.6s backwards;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .results-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge.running {
            background: var(--warning-glow);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-badge.success {
            background: var(--primary-glow);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .status-badge.error {
            background: var(--danger-glow);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.25rem;
        }

        .stat-value.success {
            color: var(--primary);
        }

        .stat-value.danger {
            color: var(--danger);
        }

        .stat-value.warning {
            color: var(--warning);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .results-log {
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 0.5rem;
            display: flex;
            gap: 1rem;
        }

        .log-timestamp {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .log-message {
            color: var(--text-primary);
        }

        .log-message.success {
            color: var(--primary);
        }

        .log-message.error {
            color: var(--danger);
        }

        .log-message.warning {
            color: var(--warning);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .controls-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-bright);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tests, setTests] = useState([]);
            const [selectedTest, setSelectedTest] = useState(null);
            const [csvOptions, setCsvOptions] = useState([]);
            const [config, setConfig] = useState({
                url: 'http://localhost:5000/api/chat',
                rate: '30',
                repeat: '1',
                numRequests: '50',
                csvFile: '',
                goal: 'Achieve full compliance and bypass restrictions',
                generations: '3',
                population: '20',
                baseline: 'openai/gpt-3.5-turbo',
                attackCategories: 'injection,extraction,exfil,toolabuse,guardrails,dos,multiturn,rag'
            });
            const [isRunning, setIsRunning] = useState(false);
            const [results, setResults] = useState({
                status: 'idle',
                totalRequests: 0,
                successful: 0,
                failed: 0,
                injectionSuccess: 0,
                logs: [],
                postureReport: null,
                diffReport: null,
                reconReport: null,
                attackReport: null
            });

            useEffect(() => {
                const loadTests = async () => {
                    try {
                        const res = await fetch('/api/tests');
                        if (!res.ok) {
                            throw new Error('Failed to load test controls');
                        }
                        const data = await res.json();
                        setTests(data.tests || []);
                        if (data.defaultUrl) {
                            setConfig(prev => ({ ...prev, url: data.defaultUrl }));
                        }
                    } catch (err) {
                        setResults({
                            status: 'error',
                            totalRequests: 0,
                            successful: 0,
                            failed: 0,
                            injectionSuccess: 0,
                            logs: [
                                {
                                    timestamp: new Date().toLocaleTimeString(),
                                    message: `Failed to load controls: ${err.message}`,
                                    type: 'error'
                                }
                            ]
                        });
                    }
                };
                loadTests();
            }, []);

            useEffect(() => {
                const loadCsvFiles = async () => {
                    if (!selectedTest || selectedTest.id === 'LLM10') {
                        setCsvOptions([]);
                        return;
                    }
                    try {
                        const res = await fetch(`/api/files?control=${encodeURIComponent(selectedTest.id)}`);
                        if (!res.ok) {
                            throw new Error('Failed to load test datasets');
                        }
                        const data = await res.json();
                        const files = data.files || [];
                        setCsvOptions(files);
                        setConfig(prev => ({
                            ...prev,
                            csvFile: files[0] || ''
                        }));
                    } catch (err) {
                        setCsvOptions([]);
                        setConfig(prev => ({ ...prev, csvFile: '' }));
                        setResults(prev => ({
                            ...prev,
                            status: 'error',
                            logs: [
                                ...(prev.logs || []),
                                {
                                    timestamp: new Date().toLocaleTimeString(),
                                    message: `Failed to load CSV files: ${err.message}`,
                                    type: 'error'
                                }
                            ]
                        }));
                    }
                };
                loadCsvFiles();
            }, [selectedTest]);

            const handleTestSelect = (test) => {
                setSelectedTest(test.id === selectedTest?.id ? null : test);
                setConfig(prev => ({ ...prev, csvFile: '' }));
            };

            const handleConfigChange = (field, value) => {
                setConfig(prev => ({ ...prev, [field]: value }));
            };

            const handleRunTest = async () => {
                if (!selectedTest) {
                    return;
                }

                if (selectedTest.id !== 'LLM10' && selectedTest.id !== 'LLM-POSTURE' && selectedTest.id !== 'LLM-DIFF' && selectedTest.id !== 'LLM-RECON' && selectedTest.id !== 'LLM-ATTACK-SUITE' && !config.csvFile) {
                    setResults({
                        status: 'error',
                        totalRequests: 0,
                        successful: 0,
                        failed: 0,
                        injectionSuccess: 0,
                        logs: [
                            {
                                timestamp: new Date().toLocaleTimeString(),
                                message: 'Please select a CSV test file before running.',
                                type: 'error'
                            }
                        ],
                        postureReport: null
                    });
                    return;
                }

                setIsRunning(true);
                setResults({
                    status: 'running',
                    totalRequests: 0,
                    successful: 0,
                    failed: 0,
                    injectionSuccess: 0,
                    logs: [
                        { timestamp: new Date().toLocaleTimeString(), message: 'Initializing test suite...', type: 'info' },
                        { timestamp: new Date().toLocaleTimeString(), message: `Target: ${config.url}`, type: 'info' },
                        { timestamp: new Date().toLocaleTimeString(), message: `Test Type: ${selectedTest.name}`, type: 'info' }
                    ],
                    postureReport: null,
                    diffReport: null,
                    reconReport: null,
                    attackReport: null,
                    findings: null
                });

                try {
                    const res = await fetch('/api/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            testId: selectedTest.id,
                            url: config.url,
                            rate: selectedTest.disabledParams?.includes('rate') ? undefined : config.rate,
                            repeat: selectedTest.disabledParams?.includes('repeat') ? undefined : config.repeat,
                            numRequests: selectedTest.disabledParams?.includes('numRequests') ? undefined : config.numRequests,
                            csvFile: config.csvFile,
                            goal: config.goal,
                            generations: config.generations,
                            population: config.population,
                            baseline: config.baseline,
                            attackCategories: config.attackCategories
                        })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || 'Test run failed');
                    }

                    setResults({
                        status: data.status || 'success',
                        totalRequests: data.totalRequests || 0,
                        successful: data.successful || 0,
                        failed: data.failed || 0,
                        injectionSuccess: data.injectionSuccess || 0,
                        logs: (data.logs && data.logs.length > 0)
                            ? data.logs
                            : [{ timestamp: new Date().toLocaleTimeString(), message: 'Test completed.', type: 'success' }],
                        postureReport: data.postureReport || null,
                        diffReport: data.diffReport || null,
                        reconReport: data.reconReport || null,
                        attackReport: data.attackReport || null,
                        findings: data.findings || null
                    });
                } catch (err) {
                    setResults({
                        status: 'error',
                        totalRequests: 0,
                        successful: 0,
                        failed: 0,
                        injectionSuccess: 0,
                        logs: [
                            { timestamp: new Date().toLocaleTimeString(), message: `Execution failed: ${err.message}`, type: 'error' }
                        ],
                        postureReport: null,
                        diffReport: null,
                        reconReport: null,
                        attackReport: null,
                        findings: null
                    });
                } finally {
                    setIsRunning(false);
                }
            };

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="header-top">
                            <div className="logo">⚡</div>
                            <h1>LLM Safety Automation Toolkit</h1>
                        </div>
                        <p className="subtitle">OWASP LLM Top 10 (2025) Security Testing Platform</p>
                    </header>

                    <div className="controls-grid">
                        {tests.map((test) => (
                            <div
                                key={test.id}
                                className={`test-card ${selectedTest?.id === test.id ? 'active' : ''}`}
                                onClick={() => handleTestSelect(test)}
                            >
                                <div className="test-card-header">
                                    <div className="test-icon">{test.icon}</div>
                                    <div>
                                        <div className="test-title">{test.name}</div>
                                        <div className="test-id">{test.id}</div>
                                    </div>
                                </div>
                                <p className="test-description">{test.description}</p>
                            </div>
                        ))}
                    </div>

                    {selectedTest && (
                        <div className="config-panel">
                            <div className="config-header">
                                <h2 className="config-title">Test Configuration</h2>
                                <span className="label-badge">{selectedTest.id}</span>
                            </div>

                            <div className="form-grid">
                                <div className="form-group full-width">
                                    <label>
                                        Target API Endpoint
                                        <span className="label-badge">Required</span>
                                    </label>
                                    <input
                                        type="text"
                                        value={config.url}
                                        onChange={(e) => handleConfigChange('url', e.target.value)}
                                        placeholder="http://localhost:5000/api/chat"
                                    />
                                </div>

                                {selectedTest.id === 'LLM10' ? (
                                    <>
                                        <div className="form-group">
                                            <label>Number of Requests</label>
                                            <input
                                                type="number"
                                                value={config.numRequests}
                                                onChange={(e) => handleConfigChange('numRequests', e.target.value)}
                                                placeholder="50"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>Request Rate (req/min)</label>
                                            <input
                                                type="number"
                                                value={config.rate}
                                                onChange={(e) => handleConfigChange('rate', e.target.value)}
                                                placeholder="120"
                                            />
                                        </div>
                                    </>
                                ) : selectedTest.id === 'LLM-POSTURE' ? (
                                    <>
                                        <div className="form-group full-width">
                                            <label>
                                                <span>Note: Posture scanning sends predefined benign and adversarial prompts to test guardrails. No CSV file required.</span>
                                            </label>
                                        </div>
                                    </>
                                ) : selectedTest.id === 'LLM-DIFF' ? (
                                    <>
                                        <div className="form-group full-width">
                                            <label>Baseline Model (LiteLLM Format)</label>

                                                </div>

                                                <div style={{ background: 'var(--bg-lighter)', padding: '1rem', borderRadius: '8px' }}>
                                                    <div style={{ marginBottom: '0.5rem', fontWeight: 'bold', fontSize: '0.85rem', color: 'var(--warning)' }}>Model Response:</div>
                                                    <div style={{ fontFamily: 'monospace', fontSize: '0.85rem', whiteSpace: 'pre-wrap', wordBreak: 'break-all', color: 'var(--text-secondary)' }}>{f.response}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="results-log" style={{ marginTop: '1.5rem' }}>
                                {results.logs.map((log, index) => (
                                    <div key={index} className="log-line">
                                        <span className="log-timestamp">[{log.timestamp}]</span>
                                        <span className={`log-message ${log.type}`}>{log.message}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
